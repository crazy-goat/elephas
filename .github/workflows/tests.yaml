name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: ffi, gmp, bcmath

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer Audit
        run: composer audit

      - name: Run code style checks
        run: composer lint

  tests:
    name: Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          extensions: ffi, gmp, bcmath
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Start TigerBeetle
        run: |
          docker run --rm --privileged \
            -v /tmp/tb:/tmp/tb \
            ghcr.io/tigerbeetle/tigerbeetle:0.17.4 \
            format --cluster=0 --replica=0 --replica-count=1 /tmp/tb/data

          docker run -d --name tigerbeetle --rm --privileged \
            -p 3000:3000 \
            -v /tmp/tb:/tmp/tb \
            ghcr.io/tigerbeetle/tigerbeetle:0.17.4 \
            start --addresses=3000 --development /tmp/tb/data

          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/3000' 2>/dev/null; then
              echo "TigerBeetle is ready"
              break
            fi
            echo "Waiting for TigerBeetle... ($i/30)"
            sleep 1
          done

      - name: Run tests
        run: vendor/bin/phpunit
        env:
          TIGERBEETLE_ADDRESS: localhost:3000

      - name: Stop TigerBeetle
        if: always()
        run: docker stop tigerbeetle || true
