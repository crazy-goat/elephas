name: Tests

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: ffi, gmp, bcmath

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer Audit
        run: composer audit

      - name: Run code style checks
        run: composer lint

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']

    services:
      tigerbeetle:
        image: ghcr.io/tigerbeetle/tigerbeetle:0.17.4
        options: >
          --entrypoint sh --
          -c "tigerbeetle format --cluster=0 --replica=0 --replica-count=1 --development /data/0_0.tigerbeetle &&
              tigerbeetle start --addresses=3000 --development /data/0_0.tigerbeetle"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: ffi, gmp, bcmath

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: composer test:unit

      - name: Run functional tests
        run: composer test:functional
        env:
          TB_ADDRESS: localhost:3000

  ci:
    name: CI
    needs: [lint, tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.tests.result }}" != "success" ]; then exit 1; fi
