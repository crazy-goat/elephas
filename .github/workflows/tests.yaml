name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TB_VERSION: 0.17.4
  ZIG_VERSION: 0.14.1
  CACHE_VERSION: v2

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: ffi, gmp, bcmath

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer Audit
        run: composer audit

      - name: Run code style checks
        run: composer lint

  build-lib:
    name: Build native tb_client library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cached build artifacts
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            resources/lib
            ~/.cache/elephas
          key: tb-client-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ env.TB_VERSION }}-${{ env.ZIG_VERSION }}
          restore-keys: |
            tb-client-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ env.TB_VERSION }}-
            tb-client-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Build native tb_client library
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: bash bin/build-tb-client.sh
        env:
          TB_VERSION: ${{ env.TB_VERSION }}
          ZIG_VERSION: ${{ env.ZIG_VERSION }}

      - name: List built artifacts
        run: find resources/lib/ -type f -ls

  test-matrix:
    name: Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: [build-lib]
    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          extensions: ffi, gmp, bcmath
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Restore native tb_client library from cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            resources/lib
            ~/.cache/elephas
          key: tb-client-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ env.TB_VERSION }}-${{ env.ZIG_VERSION }}
          restore-keys: |
            tb-client-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ env.TB_VERSION }}-
            tb-client-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Build native tb_client library (cache miss fallback)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: bash bin/build-tb-client.sh
        env:
          TB_VERSION: ${{ env.TB_VERSION }}
          ZIG_VERSION: ${{ env.ZIG_VERSION }}

      - name: Run unit tests with coverage
        run: vendor/bin/phpunit --testsuite=unit --coverage-clover=coverage/clover.xml

      - name: Check coverage threshold
        if: matrix.php-version == '8.2'
        run: php bin/check-coverage.php coverage/clover.xml 80

      - name: Start TigerBeetle
        run: |
          # The format command only creates a data file — no special capabilities
          # are required.
          docker run --rm \
            -v /tmp/tb:/tmp/tb \
            ghcr.io/tigerbeetle/tigerbeetle:${{ env.TB_VERSION }} \
            format --cluster=0 --replica=0 --replica-count=1 /tmp/tb/data

          # The start command runs with --development which disables direct I/O,
          # so io_uring capabilities are not strictly needed.  We add IPC_LOCK
          # (for mlock) and SYS_RAWIO (for io_uring if the kernel supports it)
          # as a safety net — this is the documented minimum set for TigerBeetle
          # and is far narrower than --privileged.
          docker run -d --name tigerbeetle --rm \
            --cap-add=IPC_LOCK \
            --cap-add=SYS_RAWIO \
            -p 3000:3000 \
            -v /tmp/tb:/tmp/tb \
            ghcr.io/tigerbeetle/tigerbeetle:${{ env.TB_VERSION }} \
            start --addresses=3000 --development /tmp/tb/data

          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/3000' 2>/dev/null; then
              echo "TigerBeetle is ready"
              break
            fi
            echo "Waiting for TigerBeetle... ($i/30)"
            sleep 1
          done

      - name: Run functional tests
        run: vendor/bin/phpunit --testsuite=functional
        env:
          TIGERBEETLE_ADDRESS: localhost:3000

      - name: Stop TigerBeetle
        if: always()
        run: docker stop tigerbeetle || true

  tests:
    name: tests
    needs: [lint, build-lib, test-matrix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-lib.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then exit 1; fi
