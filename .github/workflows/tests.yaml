name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: ffi, gmp, bcmath

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer Audit
        run: composer audit

      - name: Run code style checks
        run: composer lint

  test-matrix:
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
      fail-fast: false

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: ffi, gmp, bcmath

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start TigerBeetle
        run: |
          docker run -d --name tigerbeetle --rm -p 3000:3000 \
            ghcr.io/tigerbeetle/tigerbeetle:0.17.4 \
            start --addresses=3000 --development
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "TigerBeetle is ready"
              break
            fi
            echo "Waiting for TigerBeetle... ($i/30)"
            sleep 1
          done

      - name: Run unit tests
        run: composer test:unit

      - name: Run functional tests
        run: composer test:functional
        env:
          TB_ADDRESS: localhost:3000

      - name: Stop TigerBeetle
        if: always()
        run: docker stop tigerbeetle || true

  tests:
    name: tests
    needs: [lint, test-matrix]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then exit 1; fi
