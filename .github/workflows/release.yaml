name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-libs:
    name: Build tb_client (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            release-dir: x86_64-linux-gnu
            ext: so
            asset-name: libtb_client-x86_64-linux-gnu.so
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            release-dir: aarch64-linux-gnu
            ext: so
            asset-name: libtb_client-aarch64-linux-gnu.so
          - os: macos-13
            platform: macos-amd64
            release-dir: x86_64-macos
            ext: dylib
            asset-name: libtb_client-x86_64-macos.dylib
          - os: macos-latest
            platform: macos-arm64
            release-dir: aarch64-macos
            ext: dylib
            asset-name: libtb_client-aarch64-macos.dylib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tb_client
        run: bash bin/build-tb-client.sh

      - name: Stage release asset
        run: cp "resources/lib/${{ matrix.release-dir }}/libtb_client.${{ matrix.ext }}" "${{ matrix.asset-name }}"

      - name: Verify staged asset
        run: |
          set -euo pipefail
          ls -la "${{ matrix.asset-name }}"
          file "${{ matrix.asset-name }}"

      - name: Generate SHA256 checksum
        run: |
          set -euo pipefail
          sha256sum "${{ matrix.asset-name }}" > "${{ matrix.asset-name }}.sha256"
          cat "${{ matrix.asset-name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tb_client-${{ matrix.platform }}
          path: |
            ${{ matrix.asset-name }}
            ${{ matrix.asset-name }}.sha256
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-libs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: tb_client-*
          merge-multiple: true

      - name: Generate combined SHA256SUMS.txt
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum libtb_client-x86_64-linux-gnu.so \
                     libtb_client-aarch64-linux-gnu.so \
                     libtb_client-x86_64-macos.dylib \
                     libtb_client-aarch64-macos.dylib > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/libtb_client-x86_64-linux-gnu.so
            artifacts/libtb_client-x86_64-linux-gnu.so.sha256
            artifacts/libtb_client-aarch64-linux-gnu.so
            artifacts/libtb_client-aarch64-linux-gnu.so.sha256
            artifacts/libtb_client-x86_64-macos.dylib
            artifacts/libtb_client-x86_64-macos.dylib.sha256
            artifacts/libtb_client-aarch64-macos.dylib
            artifacts/libtb_client-aarch64-macos.dylib.sha256
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
